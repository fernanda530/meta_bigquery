name: Meta histórico a BigQuery y Google Sheets

on:
  workflow_dispatch:

jobs:
  run-historico:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Autenticarse con Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_CREDENTIALS_JSON }}'

      - name: Ejecutar histórico a BigQuery y Sheets
        env:
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          META_AD_ACCOUNT_ID: ${{ secrets.META_AD_ACCOUNT_ID }}
          META_API_VERSION: v25.0
          META_FIELDS: reach,campaign_id,campaign_name,ad_id,ad_name,actions,cost_per_action_type,cpc,date_start,date_stop,spend,adset_name,objective
          META_BREAKDOWNS: age,gender
          META_LEVEL: ad

          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          BQ_DATASET: ${{ secrets.BQ_DATASET }}

          ACTUALIZAR_GOOGLE_SHEETS: "True"
          GOOGLE_SHEETS_SPREADSHEET_ID: ${{ secrets.GOOGLE_SHEETS_SPREADSHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GCP_CREDENTIALS_JSON }}

        run: |
          python historico_meta.py
